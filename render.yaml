services:
  # --- FastAPI scripts backend ---
  - type: web
    name: csec-scripts-api
    runtime: python
    rootDir: scripts-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
    autoDeploy: true
