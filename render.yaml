services:
  # --- Express API backend ---
  - type: web
    name: csec-supplychain-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: ALLOWED_ORIGINS
        sync: false
    autoDeploy: true

  # --- C2 Server for supply chain attack demo ---
  - type: web
    name: csec-supply-chain-attack-1tcq
    runtime: node
    rootDir: demos/token-stealer/c2-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DASH_PASS
        sync: false
    autoDeploy: false

  # --- FastAPI scripts backend ---
  - type: web
    name: csec-scripts-api
    runtime: python
    rootDir: scripts-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
    autoDeploy: true
