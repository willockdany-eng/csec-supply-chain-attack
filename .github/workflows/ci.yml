name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Build React Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run build

  scripts-api:
    name: Check FastAPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts-api/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -c "import main; print('FastAPI app imports OK')"

  dependency-audit:
    name: Audit npm Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
